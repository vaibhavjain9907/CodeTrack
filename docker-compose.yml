name: codetrack

services:
  db:
    image: postgres:17-alpine
    container_name: codetrack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: codetrack_user
      POSTGRES_PASSWORD: codetrack_pass
      POSTGRES_DB: codetrack_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codetrack_user -d codetrack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codetrack_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codetrack_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://codetrack_user:codetrack_pass@db:5432/codetrack_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # NOTE: celery_worker and celery_beat are scaffolded here for architectural
  # visibility (periodic LeetCode/Codeforces sync, per project decision).
  # They will fail to start until the "Background Jobs" module creates
  # app/core/celery_app.py. Do not run these until that module is built —
  # use `docker compose up db redis backend frontend` until then.
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codetrack_celery_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://codetrack_user:codetrack_pass@db:5432/codetrack_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.core.celery_app worker --loglevel=info

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codetrack_celery_beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://codetrack_user:codetrack_pass@db:5432/codetrack_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.core.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codetrack_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
